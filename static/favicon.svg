<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#222"/>

  <!-- Checkerboard grid (4x4) -->
  <rect x="0"  y="0"  width="8" height="8" fill="#333"/>
  <rect x="16" y="0"  width="8" height="8" fill="#333"/>
  <rect x="8"  y="8"  width="8" height="8" fill="#333"/>
  <rect x="24" y="8"  width="8" height="8" fill="#333"/>
  <rect x="0"  y="16" width="8" height="8" fill="#333"/>
  <rect x="16" y="16" width="8" height="8" fill="#333"/>
  <rect x="8"  y="24" width="8" height="8" fill="#333"/>
  <rect x="24" y="24" width="8" height="8" fill="#333"/>

  <!-- Color bars at bottom -->
  <rect x="0"            y="27" width="4.57" height="5" fill="#fff"/>
  <rect x="4.57"         y="27" width="4.57" height="5" fill="#ff0"/>
  <rect x="9.14"         y="27" width="4.57" height="5" fill="#0ff"/>
  <rect x="13.71"        y="27" width="4.57" height="5" fill="#0f0"/>
  <rect x="18.28"        y="27" width="4.57" height="5" fill="#f0f"/>
  <rect x="22.85"        y="27" width="4.57" height="5" fill="#f00"/>
  <rect x="27.42"        y="27" width="4.58" height="5" fill="#00f"/>

  <!-- Circle -->
  <circle cx="16" cy="14" r="10" fill="none" stroke="#fff" stroke-width="1"/>

  <!-- Crosshair -->
  <line x1="16" y1="2"  x2="16" y2="26" stroke="#fff" stroke-width="0.75"/>
  <line x1="2"  y1="14" x2="30" y2="14" stroke="#fff" stroke-width="0.75"/>

  <!-- Diagonal lines -->
  <line x1="0" y1="0"  x2="32" y2="27" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="32" y1="0" x2="0"  y2="27" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
</svg>
